<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Генератор городов РФ</title>
    <link rel="stylesheet" href="/assets/css/random.css">
    <link rel="icon" href="https://kuzymuzy.ru/favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/img/apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Генератор городов России">
    <meta name="description" content="Генератор городов России">
    <meta name="keywords" content="Генератор, городо, город, рандомайзер">
    <meta property="og:title" content="Генератор городов России">
    <meta property="og:description" content="Генератор городов России">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Генератор городов России">
    <meta property="og:image" content="/assets/img/apple-touch-icon.png">
    <meta property="og:locale" content="ru_RU">
    <meta name="robots" content="index, follow">
    <script src="/assets/scripts/ukraine.js"></script>
</head>
<body>
    <header class="nav-bar">
        <nav>
            <ul>
                <li><a title="Вернуться на главную страницу" href="index.html"><img src="favicon.ico" alt="Логотип" class="logo"></a></li>
                <li class="theme-container">
                    <span title="Это то какая у тебя темя будет)" class="theme-icon" id="theme-icon">🌑</span>
                    <label title="Сменить оформление" class="theme-switch">
                        <input type="checkbox" id="theme-toggle">
                        <span class="slider"></span>
                    </label>
                </li>
            </ul>
        </nav>
    </header>
    <div class="container">
        <h1>Генератор городов России</h1>
        <button id="generate-btn">Сгенерировать город</button>
        <div id="city-display" class="city-display"></div>
    </div>
    <footer style="position:fixed;" class="footer-bar">
        <img class="bankimg" src="favicon.ico" width="40"><br><br>
        <p>© 2026 KuzyMuzy inc. Все права защищены.</p>
        <a title="Форма входа в админку(убрать на релизе)" href="admin.html">Пароль от адмники: 1234admin1234</a>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            let cities = [];

            function loadCities() {
                fetch('/assets/cities.txt')
                    .then(response => response.text())
                    .then(text => {
                        cities = text.split('\n').map(city => city.trim()).filter(city => city.length > 0);
                    })
                    .catch(error => console.error('Ошибка загрузки списка городов:', error));
            }

            loadCities();

            const generateBtn = document.getElementById('generate-btn');
            const cityDisplay = document.getElementById('city-display');

            generateBtn.addEventListener('click', function() {
                if (cities.length === 0) {
                    cityDisplay.textContent = 'Города не загружены.';
                    return;
                }
                const randomIndex = Math.floor(Math.random() * cities.length);
                const randomCity = cities[randomIndex];
                cityDisplay.textContent = randomCity;
            });
        });
    </script>

    <script src="/assets/scripts/random.js"></script>
</body>
</html>
