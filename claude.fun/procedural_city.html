
<style>
  canvas { display: block; width: 100%; height: auto; }
  #ui { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; padding: 8px 0 4px; }
  #lbl { font-size: 12px; color: var(--color-text-secondary); font-family: var(--font-mono); margin-left: auto; }
  #mood { font-size: 12px; color: var(--color-text-secondary); font-style: italic; padding-bottom: 8px; min-height: 16px; }
</style>

<canvas id="c" width="680" height="380"></canvas>
<div id="ui">
  <button onclick="build()">Новый город ↗</button>
  <button onclick="toggleTime()" id="tbtn">Время: ночь</button>
  <span id="lbl">—</span>
</div>
<div id="mood"></div>

<script>
const cv = document.getElementById('c');
const cx = cv.getContext('2d');
const W = 680, H = 380;

const CITIES = [
  { name: "Мегаполис",    density: 0.92, avgH: 200, variety: 0.9,  glowColor: "#ff6b35", skyTop: "#0a0015", skyBot: "#1a0035", fogColor: "#200040" },
  { name: "Портовый",     density: 0.60, avgH: 110, variety: 0.6,  glowColor: "#00e5ff", skyTop: "#000d1a", skyBot: "#001a33", fogColor: "#001428" },
  { name: "Ретро-сити",   density: 0.70, avgH: 140, variety: 0.75, glowColor: "#ffcc00", skyTop: "#080010", skyBot: "#100020", fogColor: "#180028" },
  { name: "Пригород",     density: 0.35, avgH: 60,  variety: 0.4,  glowColor: "#a0e0a0", skyTop: "#010810", skyBot: "#05152a", fogColor: "#081020" },
  { name: "Дистопия",     density: 0.85, avgH: 260, variety: 1.0,  glowColor: "#ff0066", skyTop: "#0d0000", skyBot: "#1a0010", fogColor: "#200010" },
];

function rng(seed) {
  let s = seed;
  return () => { s = (s * 1664525 + 1013904223) & 0xFFFFFFFF; return (s >>> 0) / 0xFFFFFFFF; };
}

let currentSeed = 0, city = null, buildings = [], stars = [], isDay = false;

function lerp(a,b,t){ return a+(b-a)*t; }
function hex2rgb(h){ return [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)]; }
function rgb(r,g,b,a=1){ return `rgba(${Math.round(r)},${Math.round(g)},${Math.round(b)},${a})`; }

function buildCity(seed) {
  const r = rng(seed);
  const cfg = CITIES[Math.floor(r()*CITIES.length)];
  document.getElementById('lbl').textContent = `${cfg.name} · seed:${seed.toString(16).padStart(5,'0')}`;
  document.getElementById('mood').textContent = '';

  const ground = H - 40;
  const layers = 3;
  const blds = [];

  for (let layer = 0; layer < layers; layer++) {
    const z = layer / (layers-1);
    const count = Math.floor(lerp(8, 28, cfg.density) * (1 - z*0.3));
    const slotW = W / count;

    for (let i = 0; i < count; i++) {
      const bh = (50 + r()*cfg.avgH) * (1 + r()*cfg.variety * 0.8);
      const bw = slotW * (0.6 + r()*0.35);
      const bx = i * slotW + r()*(slotW - bw);
      const by = ground - bh * (1 - z*0.25);
      const alpha = 1 - z*0.3;

      const type = r() < 0.15 ? 'tower' : r() < 0.3 ? 'flat' : 'box';
      const winRows = Math.max(2, Math.floor(bh/18));
      const winCols = Math.max(1, Math.floor(bw/12));

      const windows = [];
      for (let wr=0; wr<winRows; wr++) {
        for (let wc=0; wc<winCols; wc++) {
          windows.push({ on: r()<0.45, flicker: r()<0.04 });
        }
      }

      blds.push({ x:bx, y:by, w:bw, h:bh, type, alpha, layer, z, winRows, winCols, windows, seed:r()*1000 });
    }
  }

  const strs = [];
  for(let i=0;i<120;i++) strs.push({ x: r()*W, y: r()*(H*0.55), r: r()*1.2+0.2, bri: r() });

  return { cfg, buildings: blds, stars: strs, ground };
}

function drawSky(cfg, dayT) {
  const g = cx.createLinearGradient(0,0,0,H*0.7);
  if(dayT < 0.5) {
    const t = dayT*2;
    const top = [10,20,40], bot = [20,40,80];
    g.addColorStop(0, rgb(...top.map(v=>v*t+10*(1-t))));
    g.addColorStop(1, rgb(...bot.map(v=>v*t+20*(1-t))));
  } else {
    const t = (dayT-0.5)*2;
    g.addColorStop(0, rgb(lerp(10,100,t), lerp(20,140,t), lerp(40,200,t)));
    g.addColorStop(1, rgb(lerp(20,160,t), lerp(40,180,t), lerp(80,220,t)));
  }
  cx.fillStyle = g;
  cx.fillRect(0,0,W,H);
}

function drawStars(strs, alpha) {
  for(const s of strs) {
    cx.beginPath();
    cx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    cx.fillStyle = `rgba(255,255,255,${s.bri*alpha})`;
    cx.fill();
  }
}

function drawBuilding(b, cfg, dayT, t) {
  const nightAlpha = 1 - dayT;
  const darka = lerp(0.15, 0.85, b.z) * nightAlpha + dayT * 0.3;

  cx.globalAlpha = b.alpha;

  const shade = Math.floor(lerp(15,55,b.z) + dayT*60);
  cx.fillStyle = `rgb(${shade},${shade},${shade+5})`;
  cx.fillRect(b.x, b.y, b.w, b.h);

  if(b.type === 'tower') {
    cx.fillStyle = `rgb(${shade+5},${shade},${shade+10})`;
    cx.fillRect(b.x + b.w*0.3, b.y - b.h*0.25, b.w*0.4, b.h*0.25);
    cx.fillRect(b.x + b.w*0.43, b.y - b.h*0.38, b.w*0.14, b.h*0.14);
    if(nightAlpha > 0.3) {
      cx.beginPath();
      cx.arc(b.x + b.w*0.5, b.y - b.h*0.39, 3, 0, Math.PI*2);
      cx.fillStyle = `rgba(255,80,80,${nightAlpha * (Math.sin(t*0.05+b.seed)>0?1:0)})`;
      cx.fill();
    }
  }
  if(b.type === 'flat') {
    cx.fillStyle = `rgb(${shade+3},${shade+3},${shade+8})`;
    for(let i=0;i<3;i++) {
      cx.fillRect(b.x + i*(b.w/3)+2, b.y-8, b.w/3-4, 8);
    }
  }

  const padX = b.w*0.1, padY = b.h*0.08;
  const cellW = (b.w - padX*2) / b.winCols;
  const cellH = (b.h - padY*2) / b.winRows;

  for(let row=0; row<b.winRows; row++) {
    for(let col=0; col<b.winCols; col++) {
      const wi = row*b.winCols+col;
      const w = b.windows[wi];
      const wx = b.x + padX + col*cellW + cellW*0.15;
      const wy = b.y + padY + row*cellH + cellH*0.15;
      const ww = cellW*0.65, wh = cellH*0.6;

      let on = w.on;
      if(w.flicker) on = Math.sin(t*0.3+wi*7.3+b.seed)>0.2;

      if(on && nightAlpha > 0.1) {
        const gc = hex2rgb(cfg.glowColor);
        const warmth = 0.4+Math.sin(wi*3.7+b.seed)*0.3;
        const wr = lerp(gc[0]*0.6+160, gc[0], warmth);
        const wg = lerp(gc[1]*0.6+140, gc[1], warmth);
        const wb2 = lerp(gc[2]*0.6+80, gc[2], warmth);
        cx.fillStyle = rgb(wr,wg,wb2, nightAlpha*0.9);
        cx.fillRect(wx, wy, ww, wh);
        cx.fillStyle = rgb(wr,wg,wb2, nightAlpha*0.15);
        cx.fillRect(wx-2, wy-2, ww+4, wh+4);
      } else if(dayT > 0.3) {
        cx.fillStyle = `rgba(160,200,240,${dayT*0.7})`;
        cx.fillRect(wx, wy, ww, wh);
      }
    }
  }

  cx.globalAlpha = 1;
}

function drawFog(cfg, dayT) {
  const gc = hex2rgb(cfg.fogColor);
  const g = cx.createLinearGradient(0, H*0.5, 0, H);
  g.addColorStop(0, `rgba(${gc[0]},${gc[1]},${gc[2]},0)`);
  g.addColorStop(1, `rgba(${gc[0]},${gc[1]},${gc[2]},${0.7*(1-dayT)+dayT*0.2})`);
  cx.fillStyle = g;
  cx.fillRect(0,H*0.5,W,H);
}

function drawGround(cfg, dayT, ground) {
  const gc = hex2rgb(cfg.fogColor);
  cx.fillStyle = rgb(gc[0]*0.5+5, gc[1]*0.5+5, gc[2]*0.5+10);
  cx.fillRect(0, ground, W, H-ground);
  const g = cx.createLinearGradient(0,ground,0,ground+20);
  g.addColorStop(0,`rgba(255,255,200,${0.15*(1-dayT)})`);
  g.addColorStop(1,`rgba(0,0,0,0)`);
  cx.fillStyle=g;
  cx.fillRect(0,ground,W,20);
}

let animId2, frame2=0, dayPhase=0, data=null;

function render() {
  animId2 = requestAnimationFrame(render);
  frame2++;
  if(!data) return;

  const {cfg, buildings, stars, ground} = data;
  const dayT = isDay ? Math.min(1, dayPhase/60) : Math.max(0, 1 - dayPhase/60);

  drawSky(cfg, dayT);
  drawStars(stars, 1-dayT);

  const sorted = [...buildings].sort((a,b)=>a.layer-b.layer);
  for(const b of sorted) drawBuilding(b, cfg, dayT, frame2);

  drawFog(cfg, dayT);
  drawGround(cfg, dayT, ground);

  dayPhase = Math.min(dayPhase+1, 60);

  if(frame2 % 150 === 0) {
    const msgs = ["тихо здесь...", "кто-то не спит", "22 миллиона огней", "дождь скоро", "последний автобус ушёл"];
    document.getElementById('mood').textContent = msgs[Math.floor(Math.random()*msgs.length)];
  }
}

function build() {
  cancelAnimationFrame(animId2);
  currentSeed = Math.floor(Math.random()*0xFFFFF);
  data = buildCity(currentSeed);
  frame2 = 0; dayPhase = 0;
  render();
}

function toggleTime() {
  isDay = !isDay; dayPhase = 0;
  document.getElementById('tbtn').textContent = isDay ? 'Время: день' : 'Время: ночь';
}

build();
</script>
